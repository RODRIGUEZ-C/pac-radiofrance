<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Cartographie applicative CASEWISE — dynamique (optimisée)</title>

<!-- Dépendances locales (même dossier) -->
<script src="./vis-network.min.js"></script>
<script src="./html2canvas.min.js"></script>

<style>
:root{
  --bg:#fff; --fg:#111; --muted:#666; --line:#d0d0d0; --accent:#1f4e79;
  --panel:#ffffff; --shadow:0 6px 18px rgba(0,0,0,.22);
}
body{font-family:Arial, sans-serif;margin:0;padding:10px;background:var(--bg);color:var(--fg)}
#topbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}

#topbar input[type=text]{padding:6px 8px;border:1px solid var(--line);border-radius:6px;min-width:220px}
#topbar select{padding:6px 8px;border:1px solid var(--line);border-radius:6px}
#topbar button{padding:6px 10px;border:1px solid var(--line);border-radius:6px;background:white;cursor:pointer}
#topbar button:hover{background:#f5f5f5}

#mynetwork{width:100%;height:78vh;border:1px solid var(--line);border-radius:10px}

#appDetails{
  position:fixed;top:68px;right:18px;width:520px;max-height:82vh;overflow:auto;
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  box-shadow:var(--shadow);padding:12px 14px;display:none;z-index:2000
}
#appDetails h2{margin:0 0 6px 0;color:var(--accent);font-size:18px}

#toast.show{opacity:0.92}

.small{font-size:12px;color:var(--muted)}

/* Vis: opacité supportée via color opacity pour edges, mais pour nodes on utilise une propriété custom + update style */
</style>
</head>
<body>

<div id="topbar">
  <div class="group">
    <b>CSV :</b> <span class="small">Ref_Appli_CASEWISE.csv</span>
  </div>

  <div class="group">
    <label>Recherche</label>
    <input id="search" type="text" list="names" placeholder="AGM" />
    <datalist id="names"></datalist>
    <button id="goSearch">Aller</button>
  </div>

  <div class="group">
    <button id="focusBtn">Focus</button>
    <label>Niveau</label>
    <select id="focusLevel">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="3">3</option>
    </select>
    <button id="exitFocus">Sortir focus</button>
  </div>

  <div class="group" style="flex:1 1 auto;">
    <div id="statusBox"></div>
  </div>

  <div class="group">
    <button id="btnProdOnly">Prod seul</button>
    <button id="btnAllStatus">Tous statuts</button>
    <button id="resetView">Reset vue</button>
    <button id="exportPNG">Export PNG</button>
    <button id="exportCSV">Export CSV</button>
    <span id="counters"></span>
  </div>
</div>

<div id="mynetwork"></div>

<div id="appDetails"></div>
<div id="toast"></div>

<script>
// ==============================================================
// 1) Parser CSV robuste (gère champs entre guillemets + retours ligne)
// ==============================================================
function parseCSV(text, delimiter=';') {
  // Supprime BOM éventuel
  text = text.replace(/^\uFEFF/, '');

  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;

  for (let i=0;i<text.length;i++) {
    const c = text[i];

    if (inQuotes) {
      if (c === '"') {
        // double quote escape ""
        if (text[i+1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if (c === '"') {
        inQuotes = true;
      } else if (c === delimiter) {
        row.push(field);
        field = '';
      } else if (c === '\n') {
        row.push(field);
        field = '';
        rows.push(row);
        row = [];
      } else if (c === '\r') {
        // ignore \r (CRLF)
      } else {
        field += c;
      }
    }
  }
  // last field
  row.push(field);
  rows.push(row);
  return rows;
}

function clean(s){
  return (s||'').replace(/^\s+|\s+$/g,'').replace(/^"+|"+$/g,'').trim();
}

function splitMulti(v){
  v = (v||'');
  // Les multi-valeurs CASEWISE sont séparées par retours ligne
  return v.split(/\r?\n/).map(x=>clean(x)).filter(Boolean);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ==============================================================
// 2) Config & état
// ==============================================================
const CSV_FILE = './Ref_Appli_CASEWISE.csv';
const DEFAULT_APP = 'AGM';

const STATUS_COLORS = {
  '1-Approuvé/En Projet': '#1f77b4',
  '2-En évaluation': '#ff7f0e',
  '3-POC/Pilote': '#2ca02c',
  '4-Consultée': '#d62728',
  '5-En production': '#9467bd',
  '6-A décommissioner': '#8c564b',
  '7-Non utilisée': '#e377c2',
  '8-Décommissionnée': '#7f7f7f'
};

let headers = [];
let idx = {};
let records = [];             // array of objects {colName: value}
let appByName = new Map();    // name -> record object
let idByName = new Map();
let nameById = new Map();

let allEdges = [];            // array {fromId,toId,type,label,arrows,color}

let network;
let currentFocusName = '';
let focusActive = false;
let selectedStatuses = new Set(['5-En production']);

// ==============================================================
// 3) Construction modèle à partir du CSV
// ==============================================================
function ensureIndex(){
  const needed = [
    'Nom','Alias','Fonctionnalité principale','Niveau applicatif','Statut de production','Description',
    'U- Nombre d\'utilisateurs',
    'Application Alimente Application','Application Est alimentée par Application',
    'Application Est englobé par le groupe d\'application Application',
    'Application Le groupe d\'application englobe Application'
  ];
  // crée idx exact quand possible
  idx = {};
  for (const h of needed){ idx[h] = headers.indexOf(h); }
}

function nodeColor(status){
  return STATUS_COLORS[status] || '#97c2fc';
}

function buildModel(){
  // IDs
  let id=0;
  for (const rec of records){
    const name = rec['Nom'];
    if (!name) continue;
    if (!idByName.has(name)){
      idByName.set(name,id);
      nameById.set(id,name);
      id++;
    }
  }

  // Edges (dédupliqués)
  const dedup = new Set();
  allEdges = [];

  const addEdge = (fromName,toName,type,label,arrows,color) => {
    if (!idByName.has(fromName) || !idByName.has(toName)) return;
    const fromId = idByName.get(fromName);
    const toId = idByName.get(toName);
    const key = `${fromId}|${toId}|${type}|${label}`;
    if (dedup.has(key)) return;
    dedup.add(key);
    allEdges.push({from:fromId,to:toId,type,label,arrows,color});
  };

  for (const rec of records){
    const fromName = rec['Nom'];
    if (!fromName) continue;

    // flux sortants : from alimente to
    for (const t of splitMulti(rec['Application Alimente Application'])){
      addEdge(fromName, t, 'feed', 'alimente', 'to', '#2ca02c');
    }

    // flux entrants : source alimente from
    for (const s of splitMulti(rec['Application Est alimentée par Application'])){
      addEdge(s, fromName, 'feed', 'alimente', 'to', '#2ca02c');
    }

    // group relations (non orientées)
    for (const g of splitMulti(rec["Application Est englobé par le groupe d'application Application"])){
      addEdge(g, fromName, 'group', 'groupe', '', '#555');
    }
    for (const child of splitMulti(rec["Application Le groupe d'application englobe Application"])){
      addEdge(fromName, child, 'group', 'groupe', '', '#555');
    }
  }
}

// ==============================================================
// 4) Vue / filtres / focus
// ==============================================================
function computeRegionByHops(startName, hops, allowedSet){
  // BFS non orienté sur allEdges, mais uniquement dans allowedSet
  const startId = idByName.get(startName);
  if (startId === undefined) return new Set();

  let visited = new Set([startId]);
  let frontier = new Set([startId]);

  // index adjacency for speed
  const adj = new Map();
  for (const e of allEdges){
    if (!adj.has(e.from)) adj.set(e.from, []);
    if (!adj.has(e.to)) adj.set(e.to, []);
    adj.get(e.from).push(e.to);
    adj.get(e.to).push(e.from);
  }

  for (let h=0; h<hops; h++){
    const next = new Set();
    for (const u of frontier){
      const neigh = adj.get(u) || [];
      for (const v of neigh){
        if (visited.has(v)) continue;
        if (allowedSet && !allowedSet.has(v)) continue;
        visited.add(v);
        next.add(v);
      }
    }
    frontier = next;
    if (frontier.size === 0) break;
  }
  return visited;
}

function buildVisibleData(){
  // allowed IDs by status
  const allowedIds = new Set();
  for (const [name,id] of idByName.entries()){
    const rec = appByName.get(name);
    const st = rec ? (rec['Statut de production']||'') : '';
    if (selectedStatuses.has(st)) allowedIds.add(id);
  }

  let visibleIds = allowedIds;
  if (focusActive && currentFocusName && idByName.has(currentFocusName)){
    const hops = parseInt(document.getElementById('focusLevel').value,10);
    const region = computeRegionByHops(currentFocusName, hops, allowedIds);
    visibleIds = region;
  }

  const visNodes = [];
  for (const id of visibleIds){
    const name = nameById.get(id);
    const rec = appByName.get(name);
    const st = rec ? (rec['Statut de production']||'') : '';
    const lvl = rec ? (rec['Niveau applicatif']||'') : '';
    visNodes.push({
      id,
      label: name,
      status: st,
      level: lvl,
      shape: (lvl === 'Groupe Applicatif') ? 'box' : 'dot',
      color: nodeColor(st),
      font: {size: 14}
    });
  }

  const visEdges = [];
  let eid=0;
  for (const e of allEdges){
    if (visibleIds.has(e.from) && visibleIds.has(e.to)){
      visEdges.push({
        id: eid++,
        from: e.from,
        to: e.to,
        arrows: e.arrows,
        label: '',
        color: e.color,
        width: 1
      });
    }
  }

  return {visNodes, visEdges};
}

function updateCounters(visNodes, visEdges){
  const c = document.getElementById('counters');
  c.textContent = `Nœuds: ${visNodes.length} | Flux: ${visEdges.length}`;
}

function setNetworkData(visNodes, visEdges){
  const data = { nodes: new vis.DataSet(visNodes), edges: new vis.DataSet(visEdges) };

  const many = visNodes.length > 260;
  const options = {
    layout: { improvedLayout: false },
    physics: many ? false : { stabilization: { enabled: true, iterations: 120 } },
    interaction: { hover: true, navigationButtons: true, keyboard: true }
  };

  if (!network){
    network = new vis.Network(document.getElementById('mynetwork'), data, options);

    network.on('click', (params)=>{
      if (params.nodes && params.nodes.length === 1){
        const id = params.nodes[0];
        const name = nameById.get(id);
        if (name) openAppDetails(name);
      }
    });
  } else {
    network.setOptions(options);
    network.setData(data);
  }

  // focus auto sur nœud courant
  if (focusActive && currentFocusName && idByName.has(currentFocusName)){
    const id = idByName.get(currentFocusName);
    try{ network.focus(id, {scale: 1.2}); } catch(e){}
  }
}

function applyView(){
  const {visNodes, visEdges} = buildVisibleData();
  setNetworkData(visNodes, visEdges);
  updateCounters(visNodes, visEdges);
}

// ==============================================================
// 5) Fiche application + flux entrants/sortants + navigation
// ==============================================================
function getCurrentDatasets(){
  // network.body.data est le dataset courant (vis DataSet)
  return {
    nset: network.body.data.nodes,
    eset: network.body.data.edges
  };
}

function listFlowsForApp(name){
  const id = idByName.get(name);
  const {nset, eset} = getCurrentDatasets();
  const incoming = [];
  const outgoing = [];

  eset.forEach(e=>{
    if (e.to === id){
      const n = nset.get(e.from);
      if (n) incoming.push(n.label);
    }
    if (e.from === id){
      const n = nset.get(e.to);
      if (n) outgoing.push(n.label);
    }
  });

  // tri
  incoming.sort((a,b)=>a.localeCompare(b,'fr'));
  outgoing.sort((a,b)=>a.localeCompare(b,'fr'));
  return {incoming, outgoing};
}

function highlightApp(name){
  // Mise en évidence dans le dataset courant uniquement
  const id = idByName.get(name);
  const {nset, eset} = getCurrentDatasets();

  // reset
  nset.forEach(n=>{
    nset.update({id:n.id, color: nodeColor(n.status), font:{size:14}});
  });
  eset.forEach(e=>{
    eset.update({id:e.id, width:1, color:{color:e.color, opacity:0.35}});
  });

  // highlight
  nset.update({id, color:{background:'#d62728', border:'#8b0000'}, font:{size:16, color:'#fff'}});
  eset.forEach(e=>{
    if (e.from === id || e.to === id){
      eset.update({id:e.id, width:3, color:{color:'#2ca02c', opacity:1}});
      // voisins
      nset.update({id:e.from, font:{size:15}});
      nset.update({id:e.to, font:{size:15}});
    }
  });
}

function openAppDetails(name){
  const rec = appByName.get(name);
  if (!rec) return;

  const status = rec['Statut de production'] || '';
  const lvl = rec['Niveau applicatif'] || '';
  const alias = rec['Alias'] || '';
  const func = rec['Fonctionnalité principale'] || '';
  const desc = rec['Description'] || '';
  const users = rec["U- Nombre d'utilisateurs"] || '';

  const {incoming, outgoing} = listFlowsForApp(name);

  const panel = document.getElementById('appDetails');
  panel.style.display = 'block';

  const links = (arr)=> arr.length ? arr.map(a=>`<a onclick="navigateTo('${a.replace(/'/g,"\\'")}')">${a}</a>`).join('<br>') : '—';

  panel.innerHTML = `
    <button id="appDetailsClose" title="Fermer" onclick="closeAppDetails()">✖</button>
    <h2>${name}</h2>
    <div class="meta"><b>${lvl || 'Application'}</b> — <span>${status}</span> ${alias ? '— Alias: '+alias : ''}</div>

    <div class="kv"><b>Fonctionnalité :</b> ${func}</div>
    <div class="kv"><b>Utilisateurs :</b> ${users}</div>
    <div class="kv"><b>Description :</b><br>${escapeHtml(desc).replace(/\n/g,'<br>')}</div>

    <hr>
    <h3 style="margin:0 0 6px 0; color:var(--accent)">Flux (vue courante)</h3>
    <div class="kv"><b>Entrants :</b><br>${links(incoming)}</div>
    <div class="kv"><b>Sortants :</b><br>${links(outgoing)}</div>

    <hr>
    <button onclick="exportFlowsCSV('${name.replace(/'/g,"\\'")}')">📤 Export CSV des flux</button>
  `;

  // focus + highlight
  try{
    network.selectNodes([idByName.get(name)]);
    network.focus(idByName.get(name), {scale: 1.25});
  }catch(e){}
  highlightApp(name);

  currentFocusName = name;
  updateFocusBtn();
}

function closeAppDetails(){
  document.getElementById('appDetails').style.display='none';
}

function navigateTo(name){
  // si le nœud n'est pas visible, activer focus sur lui au niveau 1
  if (!idByName.has(name)) return;
  currentFocusName = name;
  focusActive = true;
  document.getElementById('focusLevel').value = '1';
  updateFocusBtn();
  applyView();
  // ouvrir fiche après render
  setTimeout(()=>openAppDetails(name), 30);
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function exportFlowsCSV(name){
  const {incoming, outgoing} = listFlowsForApp(name);
  let csv = 'sens;application\n';
  incoming.forEach(a=>{ csv += `entrant;"${a.replace(/"/g,'""')}"\n`; });
  outgoing.forEach(a=>{ csv += `sortant;"${a.replace(/"/g,'""')}"\n`; });
  downloadText(csv, `flux_${name}.csv`, 'text/csv;charset=utf-8');
}

// ==============================================================
// 6) Exports (PNG / CSV visible)
// ==============================================================
function downloadText(text, filename, mime){
  const blob = new Blob([text], {type: mime || 'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 500);
}

function exportVisibleCSV(){
  const {nset, eset} = getCurrentDatasets();
  let csv = 'type;id;label;statut;niveau\n';
  nset.forEach(n=>{
    csv += `node;${n.id};"${(n.label||'').replace(/"/g,'""')}";"${(n.status||'').replace(/"/g,'""')}";"${(n.level||'').replace(/"/g,'""')}"\n`;
  });
  csv += 'type;id;from;to\n';
  eset.forEach(e=>{
    csv += `edge;${e.id};${e.from};${e.to}\n`;
  });
  downloadText(csv, 'cartographie_visible.csv', 'text/csv;charset=utf-8');
}

function exportPNG(){
  if (typeof html2canvas !== 'function'){
    toast('html2canvas.min.js introuvable : export PNG désactivé');
    return;
  }
  html2canvas(document.getElementById('mynetwork')).then(canvas=>{
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'cartographie.png';
    a.click();
  });
}

// ==============================================================
// 7) UI: statuts / focus / recherche
// ==============================================================
function updateFocusBtn(){
  const b = document.getElementById('focusBtn');
  b.textContent = currentFocusName ? `Focus ${currentFocusName}` : 'Focus';
}

function renderStatusFilters(){
  const box = document.getElementById('statusBox');
  box.innerHTML = '<b>Statuts</b>:';

  const statuses = Object.keys(STATUS_COLORS);
  for (const s of statuses){
    const id = 'st_' + s.replace(/[^a-z0-9]/gi,'_');
    const checked = selectedStatuses.has(s) ? 'checked' : '';
    const color = STATUS_COLORS[s];
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" id="${id}" ${checked}> <span style="display:inline-block;width:10px;height:10px;background:${color};border:1px solid #000;margin-right:4px"></span>${s}`;
    box.appendChild(label);

    label.querySelector('input').addEventListener('change', (ev)=>{
      if (ev.target.checked) selectedStatuses.add(s);
      else selectedStatuses.delete(s);
      // sécurité : au moins 1 statut
      if (selectedStatuses.size === 0){
        selectedStatuses.add('5-En production');
        document.getElementById('st_5_En_production'.replace(/[^a-z0-9]/gi,'_'));
      }
      applyView();
    });
  }
}

function setProdOnly(){
  selectedStatuses = new Set(['5-En production']);
  renderStatusFilters();
  applyView();
}

function setAllStatus(){
  selectedStatuses = new Set(Object.keys(STATUS_COLORS));
  renderStatusFilters();
  applyView();
}

function goSearch(){
  const val = clean(document.getElementById('search').value);
  if (!val) return;
  if (!idByName.has(val)){
    // tentative insensible casse
    const alt = [...idByName.keys()].find(n=>n.toLowerCase() === val.toLowerCase());
    if (alt) {
      document.getElementById('search').value = alt;
      openAppDetails(alt);
      return;
    }
    toast('Application introuvable: ' + val);
    return;
  }
  openAppDetails(val);
}

// ==============================================================
// 8) Init
// ==============================================================
async function init(){
  toast('Chargement du CSV…');

  const resp = await fetch(CSV_FILE);
  const text = await resp.text();

  const table = parseCSV(text, ';');
  if (!table || table.length < 2){
    alert('CSV vide ou illisible');
    return;
  }

  headers = table[0].map(clean);
  ensureIndex();

  // records as objects
  records = [];
  appByName = new Map();

  for (let i=1;i<table.length;i++){
    const row = table[i];
    if (!row || row.length === 0) continue;
    const rec = {};
    for (let c=0;c<headers.length;c++){
      rec[headers[c]] = clean(row[c] ?? '');
    }
    const name = rec['Nom'];
    if (!name) continue;
    records.push(rec);
    appByName.set(name, rec);
  }

  buildModel();
  toast(`CSV chargé : ${records.length} lignes, ${idByName.size} applis, ${allEdges.length} liens`);

  // datalist
  const dl = document.getElementById('names');
  dl.innerHTML = '';
  const namesSorted = [...idByName.keys()].sort((a,b)=>a.localeCompare(b,'fr'));
  for (const n of namesSorted){
    const opt = document.createElement('option');
    opt.value = n;
    dl.appendChild(opt);
  }

  // UI events
  document.getElementById('goSearch').onclick = goSearch;
  document.getElementById('search').addEventListener('keydown', (e)=>{ if(e.key==='Enter') goSearch(); });

  document.getElementById('focusBtn').onclick = ()=>{
    const val = clean(document.getElementById('search').value) || currentFocusName || DEFAULT_APP;
    if (!val || !idByName.has(val)) { toast('Choisis une application valide'); return; }
    currentFocusName = val;
    focusActive = true;
    updateFocusBtn();
    applyView();
    openAppDetails(val);
  };

  document.getElementById('exitFocus').onclick = ()=>{
    focusActive = false;
    applyView();
  };

  document.getElementById('resetView').onclick = ()=>{ try{ network.fit(); }catch(e){} };
  document.getElementById('btnProdOnly').onclick = setProdOnly;
  document.getElementById('btnAllStatus').onclick = setAllStatus;
  document.getElementById('exportCSV').onclick = exportVisibleCSV;
  document.getElementById('exportPNG').onclick = exportPNG;

  document.getElementById('focusLevel').addEventListener('change', ()=>{ if(focusActive) applyView(); });

  // Render status filters and default view: PROD only + Focus AGM niveau 1
  renderStatusFilters();

  // Default: AGM niveau 1 (pour éviter le freeze), mais TOUT le CSV est chargé en mémoire.
  document.getElementById('search').value = (idByName.has(DEFAULT_APP) ? DEFAULT_APP : namesSorted[0] || '');
  currentFocusName = document.getElementById('search').value;
  document.getElementById('focusLevel').value = '1';
  focusActive = true;
  updateFocusBtn();
  applyView();
  if (currentFocusName) openAppDetails(currentFocusName);
}

init();
</script>
</body>
