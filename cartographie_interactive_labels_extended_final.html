var container = document.getElementById("mynetwork");
var data = { nodes: nodes, edges: edges };
var options = { physics: { stabilization: false }, interaction: { hover: true, navigationButtons:true, keyboard:true } };
var network = new vis.Network(container, data, options);
var currentFocusName = "";
var focusActive = false;
var clusterOn = false;
var clusterIds = [];
function updateCounters() { var cG=0, cA=0, cM=0; nodes.forEach(function(item) { if (!item.hidden) { if (item.shape === "box") cG++; else if (item.type && item.type.toLowerCase().includes("module")) cM++; else cA++; } }); document.getElementById("counters").innerHTML = "Groupes: " + cG + " Applications: " + cA + " Modules: " + cM; }
function computeRegion() { var res = {}; var startNodes = nodes.get({ filter: function(item) { return item.label.toLowerCase() === currentFocusName.toLowerCase(); } }); if (startNodes.length === 0) return res; res[startNodes[0].id] = true; var hops = parseInt(document.getElementById("focusLevel").value); for (var h=0; h < hops; h++) { var newRes = Object.assign({}, res); edges.forEach(function(edge) { if (res[edge.from]) { newRes[edge.to] = true; } if (res[edge.to]) { newRes[edge.from] = true; } }); res = newRes; } return res; }
function applyState() {
  var sel = []; var cbs = document.getElementsByClassName("status"); for (var i=0; i < cbs.length; i++) { if (cbs[i].checked) sel.push(cbs[i].value); }
  var region = null; if (focusActive && currentFocusName) region = computeRegion();
  var nUpdates = []; nodes.forEach(function(item) { var statusOk = (!item.status) || (sel.indexOf(item.status) !== -1); var visible = statusOk; if (region) visible = visible && (region[item.id] === true); nUpdates.push({ id: item.id, hidden: !visible }); }); nodes.update(nUpdates);
  var eUpdates = []; edges.forEach(function(edge) { var from = nodes.get(edge.from); var to = nodes.get(edge.to); if ((from && !from.hidden) && (to && !to.hidden)) { eUpdates.push({ id: edge.id, hidden: false }); } else { eUpdates.push({ id: edge.id, hidden: true }); } }); edges.update(eUpdates);
  updateCounters();
}
function updateFocusBtn() { var btn = document.getElementById("focusBtn"); btn.innerHTML = currentFocusName ? "Focus " + currentFocusName : "Focus"; }
var cbsList = document.getElementsByClassName("status"); for (var i=0; i < cbsList.length; i++) { cbsList[i].onchange = function() { applyState(); }; }
document.getElementById("search").addEventListener("change", function() { var val = this.value; var result = nodes.get({ filter: function(item) { return item.label.toLowerCase() === val.toLowerCase(); } }); if (result.length > 0) { network.focus(result[0].id, { scale: 1.5, animation: { duration: 500 }}); currentFocusName = result[0].label; updateFocusBtn(); } });
network.on("click", function(params) { if (params.nodes.length === 1) { var node = nodes.get(params.nodes[0]); currentFocusName = node.label; updateFocusBtn(); } });
document.getElementById("focusBtn").onclick = function() { if (!currentFocusName) return; focusActive = true; applyState(); };
document.getElementById("exitFocus").onclick = function() { focusActive = false; currentFocusName = ""; updateFocusBtn(); applyState(); };
document.getElementById("resetView").onclick = function() { network.fit(); };
document.getElementById("resetFilters").onclick = function() { var cbs = document.getElementsByClassName("status"); for (var i=0; i < cbs.length; i++) { cbs[i].checked = true; } applyState(); };
document.getElementById("toggleCluster").onclick = function() {
  if (!clusterOn) { clusterIds = []; var groupNodes = []; nodes.forEach(function(item) { if (item.shape === "box" && !item.hidden) groupNodes.push(item); }); groupNodes.forEach(function(group) { var children = []; edges.forEach(function(edge) { if (edge.from === group.id && !nodes.get(edge.to).hidden) children.push(edge.to); }); if (children.length > 1) { var clusterId = "cluster:" + group.id; clusterIds.push(clusterId); network.cluster({ joinCondition: function(childOptions) { return children.indexOf(childOptions.id) !== -1; }, clusterNodeProperties: { id: clusterId, label: group.label, shape: "box", borderWidth: 2, color: group.color } }); } }); clusterOn = true; this.innerHTML = "Déclusteriser";
  } else { clusterIds.forEach(function(id) { try { network.openCluster(id); } catch(err) { console.log(err); } }); clusterIds = []; clusterOn = false; this.innerHTML = "Cluster ON"; }
};

document.getElementById('exportCSV').onclick = function() {
    var csv = 'type,id,label,status,type\n';
    nodes.forEach(function(item) {
        if (!item.hidden) {
            csv += 'node,' + item.id + ',"' + item.label.replace(/"/g, '\"\"') + '","' + item.status.replace(/"/g, '\"\"') + '","' + item.type.replace(/"/g, '\"\"') + '\n';
        }
    });
    csv += 'edge,id,from,to\n';
    edges.forEach(function(edge) {
        var from = nodes.get(edge.from);
        var to = nodes.get(edge.to);
        if (!edge.hidden && from && to && !from.hidden && !to.hidden) {
            csv += 'edge,' + edge.id + ',' + edge.from + ',' + edge.to + '\n';
        }
    });
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var link = document.createElement('a');
    var url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
